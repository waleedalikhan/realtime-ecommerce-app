# PostgreSQL + APIs for local run. Web and mobile run on host; set API URL to http://localhost:4000.
# Usage: docker-compose up -d   (then: pnpm db:migrate && pnpm db:seed)
# APIs connect to db via DATABASE_URL with host "db".

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: commerce
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d commerce"]
      interval: 5s
      timeout: 5s
      retries: 5

  apis:
    build:
      context: .
      dockerfile: apis/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/commerce?schema=public
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
